# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

linter:
  # The lint rules applied to this project can be customized in the
  # section below to disable rules from the included set or to enable additional rules.
  # See https://dart.dev/lints for the full list.
  rules:
    # Disabling `prefer_const_constructors` to prevent noise during active development.
    # We will enforce it later in production.
    prefer_const_constructors_in_immutables: false
    # Enforce single quotes for strings to keep formatting consistent.
    prefer_single_quotes: true
    # Always type annotate public APIs for better readability and maintainability.
    type_annotate_public_apis: true
    # Avoid returning null for void functions.
    avoid_void_async: true

# You can uncomment the section below for analyzer settings like strong-mode.
# analyzer:
